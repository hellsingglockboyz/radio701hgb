<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HGB Merch</title>
  <link rel="icon" type="image/png" href="assets/images/hgb-logo-badge-shield.png" />

  <script>
    document.addEventListener("contextmenu", function (event) {
      event.preventDefault();
    });

    document.addEventListener("dragstart", function (event) {
      event.preventDefault();
    });

    (function (s, e, n, d, er) {
      s['Sender'] = er;
      s[er] = s[er] || function () {

        s[er].listeners = s[er].listeners || {};

    })(window, document, 'script', 'https://cdn.sender.net/accounts_resources/universal.js', 'sender');
    sender('00564c47af0113')
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Courier New", monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    img {
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    a {
      font: inherit;
      text-decoration: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background: #000;
      isolation: isolate;
    }

    .background-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100vw;
      height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background: #000;
      pointer-events: none;
    }

    .bg-img {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: contrast(1.12) brightness(0.58) saturate(0.78);
      transform: scale(1.045);
      transform-origin: center;
      pointer-events: none;
    }

    .bg-darken {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.34) 42%, rgba(0,0,0,0.94) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.74), rgba(0,0,0,0.22) 35%, rgba(0,0,0,0.88));
      pointer-events: none;
    }

    .bg-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 0%, transparent 34%, rgba(0,0,0,0.92) 100%),
        linear-gradient(to right, rgba(0,0,0,0.82), transparent 18%, transparent 82%, rgba(0,0,0,0.82));
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .shadow-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 58%, rgba(0,0,0,0.24) 0%, rgba(0,0,0,0.52) 44%, transparent 70%),
        linear-gradient(to bottom, rgba(0,0,0,0.26) 0%, transparent 24%, transparent 58%, rgba(0,0,0,0.46) 100%);
    }

    .merch-center {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 520px);
      align-items: center;
      justify-content: center;
      column-gap: clamp(8px, 2.5vw, 52px);
      padding:
        clamp(76px, 9vh, 128px)
        clamp(42px, 6vw, 120px)
        clamp(56px, 8vh, 100px)
        clamp(18px, 3vw, 68px);
      pointer-events: none;
    }

    .merch-art {
      display: block;
      justify-self: end;
      width: min(66vw, 1000px);
      max-height: 66vh;
      line-height: 0;
      background: transparent;
      pointer-events: none;
      transform: translateX(clamp(-150px, -7vw, -48px));
    }

    .merch-image {
      display: block;
      width: 100%;
      height: auto;
      max-height: 66vh;
      object-fit: contain;
      background: transparent;
      image-rendering: auto;
      pointer-events: none;
    }

    .sender-embed {
      width: min(34vw, 520px);
      min-width: 360px;
      pointer-events: auto;
      position: relative;
      z-index: 8;
      justify-self: start;
      transform: translateX(clamp(-34px, -1.8vw, -12px));
      user-select: text;
      -webkit-user-select: text;

      /* AJUSTE AQUI SE PRECISAR */
      --brand-cover-left: 14px;
      --brand-cover-bottom: 12px;
      --brand-cover-width: 235px;
      --brand-cover-height: 38px;
    }

    .sender-embed * {
      -webkit-user-drag: none;
    }

    .sender-brand-cover {
      position: absolute;
      left: var(--brand-cover-left);
      bottom: var(--brand-cover-bottom);
      width: var(--brand-cover-width);
      height: var(--brand-cover-height);
      z-index: 9999;
      pointer-events: auto;
      display: block;
      overflow: hidden;
      cursor: default;
    }

    .sender-brand-cover img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .home-button {
      position: absolute;
      top: clamp(18px, 3.2vh, 42px);
      left: clamp(24px, 4vw, 76px);
      z-index: 10;
      width: clamp(72px, 5.8vw, 118px);
      height: clamp(40px, 3.3vw, 68px);
      display: block;
      background: transparent;
      filter:
        drop-shadow(0 8px 14px rgba(0,0,0,0.82));
      transition: opacity 0.16s ease, transform 0.16s ease;
      pointer-events: auto;
    }

    .home-button:hover {
      opacity: 0.82;
      transform: translateY(-1px);
    }

    .home-logo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
      pointer-events: none;
    }

    @media (max-width: 1050px) {
      .merch-center {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        row-gap: clamp(12px, 2vh, 22px);
        padding:
          clamp(86px, 10vh, 120px)
          clamp(18px, 5vw, 52px)
          clamp(34px, 5vh, 70px);
      }

      .merch-art {
        justify-self: center;
        width: min(92vw, 850px);
        max-height: 48vh;
        transform: none;
      }

      .merch-image {
        max-height: 48vh;
      }

      .sender-embed {
        justify-self: center;
        width: min(94vw, 520px);
        min-width: 0;
        transform: none;
      }
    }

    @media (max-width: 700px) {
      body {
        position: fixed;
      }

      .stage {
        overflow: hidden;
      }

      .merch-art,
      .merch-image {
        max-height: 42vh;
      }

      .sender-embed {
        width: min(94vw, 500px);
      }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="background-container" aria-hidden="true">
      <img
        src="assets/images/bg.png"
        alt=""
        class="bg-img"
        draggable="false"
      />
      <div class="bg-darken"></div>
      <div class="bg-vignette"></div>
    </div>

    <div class="shadow-layer" aria-hidden="true"></div>

    <div class="merch-center">
      <div class="merch-art" aria-label="New Merch Soon">
        <img
          src="assets/images/newmerchsoon.png"
          alt="New Merch Soon"
          class="merch-image"
          draggable="false"
          decoding="async"
          fetchpriority="high"
        />
      </div>

      <div class="sender-embed">
        <div style="text-align: left" class="sender-form-field" data-sender-form-id="dwpz5r"></div>

        <!-- Overlay em cima do branding/link -->
        <div class="sender-brand-cover" aria-hidden="true">
          <img
            src="assets/images/blank-space.png"
            alt=""
            draggable="false"
          />
        </div>
      </div>
    </div>

    <a href="./" class="home-button" aria-label="Back to home">
      <img
        src="assets/images/logo-hgb.png"
        alt="HGB"
        class="home-logo"
        draggable="false"
      />
    </a>
  </div>
</body>
</html>
